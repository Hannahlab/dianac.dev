<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Portfolio Website</title>
    <script
      src="https://fontawesome.com"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header>
      <!-- Fixed Logo: Refreshes page by pointing to index.html -->
      <a href="index.html" class="logo">Diana</a>
      <nav>
        <!-- Fixed Home: Refreshes page by pointing to index.html -->
        <a href="index.html">Home</a>
        <a
          href="https://linkedin.com"
          >About</a
        >
        <a
          href="https://linkedin.com"
          >Skills</a
        >
        <!-- Fixed Contact: Directs users to WhatsApp in a new tab -->
        <a href="https://wa.me" target="_blank">Contact</a>
      </nav>
    </header>

    <section class="home">
      <div class="home-img">
        <img
          src="https://amazonaws.com"
          alt="Diana's Image"
        />
      </div>
      <div class="home-content">
        <h1>Hi, I'm <span>Diana</span></h1>
        
        <p>
          I build modern websites that help businesses stand out, attract more customers, and grow online. Every website is designed to look great, perform well, and deliver real results.
        </p>
      </div>
      <div class="social-icons">
        <a href="https://wa.me" target="_blank"
          ><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://netlify.app"><i class="fa fa-globe"></i></a>
        <a href="https://facebook.com" target="_blank"
          ><i class="fa-brands fa-facebook"></i
        ></a>
      </div>
      <a
        href="https://wa.me?text=Hi,%20I'm%20interested%20in%20your%20web%20development%20services."
        class="btn"
        target="_blank"
        >Hire Me</a
      >
    </section>
  </body>
</html>
